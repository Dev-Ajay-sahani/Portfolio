<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Practice Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --panel: #16161f;
  --card: #1e1e2a;
  --border: #2a2a3d;
  --border2: #333350;

  --add: #00d4aa;
  --add-dim: #00d4aa22;
  --add-mid: #00d4aa55;

  --sub: #ff6b6b;
  --sub-dim: #ff6b6b22;
  --sub-mid: #ff6b6b55;

  --mul: #f9c74f;
  --mul-dim: #f9c74f22;
  --mul-mid: #f9c74f55;

  --div: #a78bfa;
  --div-dim: #a78bfa22;
  --div-mid: #a78bfa55;

  --text: #e8e8f0;
  --muted: #6666aa;
  --muted2: #9999bb;

  --green: #4ade80;
  --red: #f87171;

  --font-mono: 'Space Mono', monospace;
  --font-ui: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
}

/* ══════════════════════════════════════
   APP SHELL — fixed full-height layout
══════════════════════════════════════ */
.app {
  display: grid;
  grid-template-rows: 48px 44px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ══════════════════════════════════════
   TOP BAR
══════════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  z-index: 50;
}

.logo {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
  text-transform: uppercase;
  flex-shrink: 0;
}
.logo span { color: var(--add); }

.sw-group {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.sw-time {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  min-width: 90px;
  letter-spacing: 1px;
}
.sw-time.run { color: var(--add); }

.sw-btn {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 5px 12px;
  background: transparent;
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.sw-btn:hover { color: var(--text); border-color: var(--muted2); }
.sw-btn.active { color: var(--add); border-color: var(--add); }

/* ══════════════════════════════════════
   OPERATION TABS
══════════════════════════════════════ */
.op-tabs {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  gap: 2px;
  align-items: stretch;
}

.op-tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--muted);
  border: none;
  border-bottom: 3px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
  padding: 0 12px;
}
.op-tab:hover { color: var(--text); }
.op-tab.add.active { color: var(--add); border-bottom-color: var(--add); }
.op-tab.sub.active { color: var(--sub); border-bottom-color: var(--sub); }
.op-tab.mul.active { color: var(--mul); border-bottom-color: var(--mul); }
.op-tab.div.active { color: var(--div); border-bottom-color: var(--div); }
.op-icon { font-size: 1rem; }

/* ══════════════════════════════════════
   OPERATION PANELS
══════════════════════════════════════ */
.op-panel {
  display: none;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 1fr;
  height: 100%;
  overflow: hidden;
}
.op-panel.active { display: grid; }

/* ══════════════════════════════════════
   SIDEBAR — combination picker
══════════════════════════════════════ */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 14px 16px 10px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.combo-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.combo-list::-webkit-scrollbar { width: 4px; }
.combo-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.combo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.combo-item:hover { background: var(--card); border-color: var(--border); }
.combo-item.active.add-c { background: var(--add-dim); border-color: var(--add-mid); }
.combo-item.active.sub-c { background: var(--sub-dim); border-color: var(--sub-mid); }
.combo-item.active.mul-c { background: var(--mul-dim); border-color: var(--mul-mid); }
.combo-item.active.div-c { background: var(--div-dim); border-color: var(--div-mid); }

.combo-badge {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  min-width: 52px;
  text-align: center;
}
.add-c .combo-badge { color: var(--add); background: var(--add-dim); }
.sub-c .combo-badge { color: var(--sub); background: var(--sub-dim); }
.mul-c .combo-badge { color: var(--mul); background: var(--mul-dim); }
.div-c .combo-badge { color: var(--div); background: var(--div-dim); }

.combo-label { font-size: 0.78rem; color: var(--muted2); font-weight: 500; }
.combo-item.active .combo-label { color: var(--text); font-weight: 600; }

/* ══════════════════════════════════════
   CONTENT AREA
══════════════════════════════════════ */
.content-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.content-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
  flex-shrink: 0;
}

.toolbar-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}
.toolbar-sub {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 500;
  margin-top: 1px;
}

.tool-btn {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  border-radius: 8px;
  border: 1px solid var(--border2);
  padding: 6px 14px;
  background: var(--card);
  color: var(--muted2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.tool-btn:hover { color: var(--text); border-color: var(--muted2); }
.tool-btn:active { transform: scale(0.96); }
.tool-btn.refresh { color: var(--add); border-color: var(--add-mid); }
.tool-btn.refresh:hover { background: var(--add-dim); }
.tool-btn.ans-show { color: var(--mul); border-color: var(--mul-mid); }
.tool-btn.ans-show:hover { background: var(--mul-dim); }
.tool-btn.ans-hide { color: var(--green); border-color: #4ade8055; }
.tool-btn.ans-hide:hover { background: #4ade8022; }

/* Score display */
.score-pill {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted2);
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   QUESTION GRID AREA
══════════════════════════════════════ */
.grid-area {
  flex: 1;
  overflow: hidden;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ADDITION specific — uses existing NxN grid style */
.add-grid-wrap, .nxn-wrap {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ——————————————————
   QUESTION CARDS LAYOUT
   Flex-wrap grid that fills width, no overflow-y
—————————————————— */
.q-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-content: flex-start;
  overflow: hidden;
  flex: 1;
}

.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  min-width: 140px;
  flex: 1;
  transition: border-color 0.2s;
}
.q-card:hover { border-color: var(--border2); }
.q-card.revealed { border-color: var(--green); background: #4ade8008; }

.q-num {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--text);
  letter-spacing: 0.5px;
}
.q-op-line {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  justify-content: flex-end;
  border-top: 1px solid var(--border);
  padding-top: 3px;
  margin-top: 2px;
}
.q-op-sym {
  font-family: var(--font-mono);
  font-size: 0.95rem;
  font-weight: 700;
}
.q-op-sym.sub-sym { color: var(--sub); }
.q-op-sym.mul-sym { color: var(--mul); }
.q-op-sym.div-sym { color: var(--div); }

.q-second { font-family: var(--font-mono); font-size: 1.1rem; color: var(--text); }

.q-ans-line {
  width: 100%;
  border-top: 2px solid var(--border);
  padding-top: 4px;
  margin-top: 2px;
  text-align: right;
  font-family: var(--font-mono);
  font-size: 1.05rem;
  font-weight: 700;
}
.q-blank { color: var(--border2); letter-spacing: 3px; }
.q-answer { color: var(--green); display: none; }
.revealed .q-blank { display: none; }
.revealed .q-answer { display: block; }
.revealed .q-ans-line { border-top-color: var(--green); }

/* ══════════════════════════════════════
   ADDITION PANEL — NxN grid tables
══════════════════════════════════════ */
.add-outer {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.add-table-scroll {
  flex: 1;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.add-table-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
.add-table-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.add-tab-bar {
  display: flex;
  gap: 4px;
  padding: 0 0 10px 0;
  flex-wrap: wrap;
  flex-shrink: 0;
}

.add-tab {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}
.add-tab:hover { color: var(--text); border-color: var(--muted); }
.add-tab.active { color: var(--add); border-color: var(--add); background: var(--add-dim); }

.add-table-wrap table {
  border-collapse: separate;
  border-spacing: 4px;
}
.add-table-wrap th {
  background: var(--card);
  color: var(--add);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 6px 10px;
  border-radius: 6px;
  text-align: center;
  min-width: 42px;
  font-weight: 700;
}
.add-table-wrap td {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  text-align: right;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text);
  min-width: 80px;
}
.add-table-wrap td.total-col {
  background: var(--add-dim);
  border-color: var(--add-mid);
  color: var(--add);
  font-weight: 700;
}
.add-table-wrap td.total-row {
  background: #ff6b6b11;
  border-color: var(--sub-mid);
  color: var(--sub);
  font-weight: 700;
}
.add-table-wrap td.total-corner {
  background: var(--mul-dim);
  border-color: var(--mul-mid);
  color: var(--mul);
  font-weight: 700;
}
.ans-span { display: none; color: var(--green); }
.blank-span { color: var(--border2); letter-spacing: 2px; }
.add-answers .ans-span { display: inline; }
.add-answers .blank-span { display: none; }
.add-answers td { border-color: var(--add-mid); }
.add-answers td.total-col { border-color: var(--add); }

/* ══════════════════════════════════════
   SIZING: how many cards to show
   Controlled per combination by JS
══════════════════════════════════════ */

/* ══════════════════════════════════════
   NO CONTENT PLACEHOLDER
══════════════════════════════════════ */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
}
.empty-icon { font-size: 3rem; opacity: 0.3; }
.empty-text { font-size: 0.85rem; font-weight: 500; }

/* ══════════════════════════════════════
   SCROLLBAR GENERAL
══════════════════════════════════════ */
* { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">Math<span>∞</span>Suite</div>
    <div class="sw-group">
      <div class="sw-time" id="swDisplay">00:00.0</div>
      <button class="sw-btn" id="swStartBtn" onclick="swToggle()">▶ Start</button>
      <button class="sw-btn" onclick="swReset()">↺ Reset</button>
    </div>
  </header>

  <!-- OPERATION TABS -->
  <nav class="op-tabs">
    <button class="op-tab add active" onclick="switchOp('add')"><span class="op-icon">➕</span>Addition</button>
    <button class="op-tab sub" onclick="switchOp('sub')"><span class="op-icon">➖</span>Subtraction</button>
    <button class="op-tab mul" onclick="switchOp('mul')"><span class="op-icon">✖️</span>Multiplication</button>
    <button class="op-tab div" onclick="switchOp('div')"><span class="op-icon">➗</span>Division</button>
  </nav>

  <!-- ═══════════════ ADDITION PANEL ═══════════════ -->
  <section class="op-panel active" id="op-add">
    <div class="content-area">
      <div class="content-toolbar">
        <div>
          <div class="toolbar-title">Addition Grids</div>
          <div class="toolbar-sub">Row + Column = ?</div>
        </div>
        <button class="tool-btn refresh" onclick="addRefresh()">↻ Refresh</button>
        <button class="tool-btn ans-show" id="add-ans-btn" onclick="addToggleAns()">👁 Show Answers</button>
      </div>
      <div class="grid-area">
        <div class="add-outer">
          <div class="add-tab-bar" id="add-tab-bar"></div>
          <div class="add-table-scroll">
            <div class="add-table-wrap" id="add-table-wrap"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════════ SUBTRACTION PANEL ═══════════════ -->
  <section class="op-panel" id="op-sub">
    <aside class="sidebar">
      <div class="sidebar-head">Digit Combinations</div>
      <div class="combo-list" id="sub-combo-list"></div>
    </aside>
    <div class="content-area">
      <div class="content-toolbar">
        <div>
          <div class="toolbar-title" id="sub-toolbar-title">Subtraction</div>
          <div class="toolbar-sub" id="sub-toolbar-sub">Select a combination</div>
        </div>
        <button class="tool-btn refresh" onclick="opRefresh('sub')">↻ Refresh</button>
        <button class="tool-btn ans-show" id="sub-ans-btn" onclick="opToggleAns('sub')">👁 Show Answers</button>
      </div>
      <div class="grid-area" id="sub-grid"></div>
    </div>
  </section>

  <!-- ═══════════════ MULTIPLICATION PANEL ═══════════════ -->
  <section class="op-panel" id="op-mul">
    <aside class="sidebar">
      <div class="sidebar-head">Digit Combinations</div>
      <div class="combo-list" id="mul-combo-list"></div>
    </aside>
    <div class="content-area">
      <div class="content-toolbar">
        <div>
          <div class="toolbar-title" id="mul-toolbar-title">Multiplication</div>
          <div class="toolbar-sub" id="mul-toolbar-sub">Select a combination</div>
        </div>
        <button class="tool-btn refresh" onclick="opRefresh('mul')">↻ Refresh</button>
        <button class="tool-btn ans-show" id="mul-ans-btn" onclick="opToggleAns('mul')">👁 Show Answers</button>
      </div>
      <div class="grid-area" id="mul-grid"></div>
    </div>
  </section>

  <!-- ═══════════════ DIVISION PANEL ═══════════════ -->
  <section class="op-panel" id="op-div">
    <aside class="sidebar">
      <div class="sidebar-head">Digit Combinations</div>
      <div class="combo-list" id="div-combo-list"></div>
    </aside>
    <div class="content-area">
      <div class="content-toolbar">
        <div>
          <div class="toolbar-title" id="div-toolbar-title">Division</div>
          <div class="toolbar-sub" id="div-toolbar-sub">Select a combination</div>
        </div>
        <button class="tool-btn refresh" onclick="opRefresh('div')">↻ Refresh</button>
        <button class="tool-btn ans-show" id="div-ans-btn" onclick="opToggleAns('div')">👁 Show Answers</button>
      </div>
      <div class="grid-area" id="div-grid"></div>
    </div>
  </section>

</div>

<script>
// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function randNDigit(n) {
  if (n === 1) return rand(1, 9);
  const min = Math.pow(10, n - 1);
  const max = Math.pow(10, n) - 1;
  return rand(min, max);
}

function digitLabel(n) {
  return n + '-digit';
}

// ══════════════════════════════════════════════
// STOPWATCH
// ══════════════════════════════════════════════
let swMs = 0, swRunning = false, swTimer = null;

function swFmt(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const t = Math.floor((ms % 1000) / 100);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${t}`;
}

function swToggle() {
  const btn = document.getElementById('swStartBtn');
  const disp = document.getElementById('swDisplay');
  if (!swRunning) {
    swRunning = true;
    swTimer = setInterval(() => {
      swMs += 100;
      disp.textContent = swFmt(swMs);
    }, 100);
    btn.textContent = '⏸ Pause';
    btn.classList.add('active');
    disp.classList.add('run');
  } else {
    swRunning = false;
    clearInterval(swTimer);
    btn.textContent = '▶ Resume';
    btn.classList.remove('active');
    disp.classList.remove('run');
  }
}

function swReset() {
  swRunning = false;
  clearInterval(swTimer);
  swMs = 0;
  document.getElementById('swDisplay').textContent = '00:00.0';
  document.getElementById('swDisplay').classList.remove('run');
  document.getElementById('swStartBtn').textContent = '▶ Start';
  document.getElementById('swStartBtn').classList.remove('active');
}

// ══════════════════════════════════════════════
// OPERATION SWITCHING
// ══════════════════════════════════════════════
let currentOp = 'add';

function switchOp(op) {
  currentOp = op;
  document.querySelectorAll('.op-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.op-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.op-tab.${op}`).classList.add('active');
  document.getElementById('op-' + op).classList.add('active');
}

// ══════════════════════════════════════════════
// ADDITION — NxN GRID SYSTEM
// ══════════════════════════════════════════════
const addSizes = [
  { key: '5x5', label: '5×5', n: 5, range: [10, 99] },
  { key: '6x6', label: '6×6', n: 6, range: [10, 99] },
  { key: '7x7', label: '7×7', n: 7, range: [10, 99] },
  { key: '8x8', label: '8×8', n: 8, range: [10, 99] },
  { key: '9x9', label: '9×9', n: 9, range: [10, 99] },
  { key: '10x10', label: '10×10', n: 10, range: [10, 99] },
];

let addCurrent = '5x5';
let addData = {};
let addAnsVisible = false;

function addGenData(key) {
  const cfg = addSizes.find(s => s.key === key);
  const rows = Array.from({length: cfg.n}, () => rand(cfg.range[0], cfg.range[1]));
  const cols = Array.from({length: cfg.n}, () => rand(cfg.range[0], cfg.range[1]));
  addData[key] = { rows, cols, n: cfg.n };
}

function addRenderTable(key) {
  const { rows, cols, n } = addData[key];
  const wrap = document.getElementById('add-table-wrap');
  const visible = addAnsVisible;

  const rowTotals = rows.map(r => cols.reduce((s, c) => s + r + c, 0));
  const colTotals = cols.map((c, ci) => rows.reduce((s, r) => s + r + c, 0));
  const grand = rowTotals.reduce((a, b) => a + b, 0);

  let html = `<table><thead><tr><th style="color:var(--muted);font-size:0.7rem">＋</th>`;
  cols.forEach(c => { html += `<th>${c}</th>`; });
  html += `<th style="color:var(--sub);font-size:0.7rem">Σ row</th></tr></thead><tbody>`;

  rows.forEach((r, ri) => {
    html += `<tr><th>${r}</th>`;
    cols.forEach(c => {
      const sum = r + c;
      html += `<td>${r}+${c}=<span class="ans-span">${sum}</span><span class="blank-span">??</span></td>`;
    });
    html += `<td class="total-col"><span class="ans-span">${rowTotals[ri]}</span><span class="blank-span">???</span></td></tr>`;
  });

  html += `<tr><th style="color:var(--sub);font-size:0.7rem">Σ col</th>`;
  cols.forEach((c, ci) => {
    html += `<td class="total-row"><span class="ans-span">${colTotals[ci]}</span><span class="blank-span">???</span></td>`;
  });
  html += `<td class="total-corner"><span class="ans-span">${grand}</span><span class="blank-span">????</span></td></tr>`;
  html += `</tbody></table>`;

  wrap.innerHTML = html;
  wrap.className = 'add-table-wrap' + (visible ? ' add-answers' : '');
}

function addSwitchTab(key) {
  addCurrent = key;
  document.querySelectorAll('#add-tab-bar .add-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`#add-tab-bar [data-key="${key}"]`).classList.add('active');
  if (!addData[key]) addGenData(key);
  addRenderTable(key);
}

function addRefresh() {
  addGenData(addCurrent);
  addRenderTable(addCurrent);
}

function addToggleAns() {
  addAnsVisible = !addAnsVisible;
  const btn = document.getElementById('add-ans-btn');
  if (addAnsVisible) {
    btn.textContent = '🙈 Hide Answers';
    btn.className = 'tool-btn ans-hide';
  } else {
    btn.textContent = '👁 Show Answers';
    btn.className = 'tool-btn ans-show';
  }
  addRenderTable(addCurrent);
}

function addInit() {
  const bar = document.getElementById('add-tab-bar');
  bar.innerHTML = '';
  addSizes.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'add-tab' + (s.key === addCurrent ? ' active' : '');
    btn.dataset.key = s.key;
    btn.textContent = s.label;
    btn.onclick = () => addSwitchTab(s.key);
    bar.appendChild(btn);
    addGenData(s.key);
  });
  addRenderTable(addCurrent);
}

// ══════════════════════════════════════════════
// SUBTRACTION / MULTIPLICATION / DIVISION
// ══════════════════════════════════════════════

// SUB combos: minuend 3-6 digits, subtrahend 2-6 digits (subtrahend <= minuend digits)
const subCombos = [];
for (let m = 3; m <= 6; m++) {
  for (let s = 2; s <= m; s++) {
    subCombos.push({ a: m, b: s, key: `${m}x${s}` });
  }
}

// MUL combos: 1-6 × 1-6
const mulCombos = [];
for (let a = 1; a <= 6; a++) {
  for (let b = 1; b <= 6; b++) {
    mulCombos.push({ a, b, key: `${a}x${b}` });
  }
}

// DIV combos: dividend 2-6 digits, divisor 1-4 digits (divisor < dividend digits)
const divCombos = [];
for (let d = 2; d <= 6; d++) {
  for (let v = 1; v < d && v <= 4; v++) {
    divCombos.push({ a: d, b: v, key: `${d}x${v}` });
  }
}

const opState = {
  sub: { combos: subCombos, current: subCombos[0].key, ansVisible: false, data: {} },
  mul: { combos: mulCombos, current: mulCombos[0].key, ansVisible: false, data: {} },
  div: { combos: divCombos, current: divCombos[0].key, ansVisible: false, data: {} },
};

function opComboLabel(op, combo) {
  if (op === 'sub') return `${combo.a}-digit − ${combo.b}-digit`;
  if (op === 'mul') return `${combo.a}-digit × ${combo.b}-digit`;
  if (op === 'div') return `${combo.a}-digit ÷ ${combo.b}-digit`;
}

function opBadge(op, combo) {
  if (op === 'sub') return `${combo.a}d−${combo.b}d`;
  if (op === 'mul') return `${combo.a}d×${combo.b}d`;
  if (op === 'div') return `${combo.a}d÷${combo.b}d`;
}

function genQuestion(op, combo) {
  if (op === 'sub') {
    const a = randNDigit(combo.a);
    // ensure subtrahend ≤ a
    const bMax = Math.min(a, Math.pow(10, combo.b) - 1);
    const bMin = Math.pow(10, combo.b - 1);
    const b = bMin <= bMax ? rand(bMin, bMax) : rand(1, a);
    return { a, b, ans: a - b };
  }
  if (op === 'mul') {
    const a = randNDigit(combo.a);
    const b = randNDigit(combo.b);
    return { a, b, ans: a * b };
  }
  if (op === 'div') {
    // generate clean division: pick divisor first, multiply to get dividend
    const divisor = randNDigit(combo.b);
    const minQ = Math.ceil(Math.pow(10, combo.a - 1) / divisor);
    const maxQ = Math.floor((Math.pow(10, combo.a) - 1) / divisor);
    if (minQ > maxQ) { return genQuestion(op, combo); } // retry
    const quotient = rand(minQ, maxQ);
    const dividend = divisor * quotient;
    return { a: dividend, b: divisor, ans: quotient };
  }
}

function calcCardCount(op, combo) {
  // Estimate how many cards fit without overflow based on combo
  // Wider numbers need fewer cards; aim for roughly 3-4 rows
  const totalDigits = combo.a + combo.b;
  // Wider → fewer per row
  if (totalDigits >= 10) return 12;
  if (totalDigits >= 8) return 16;
  if (totalDigits >= 6) return 20;
  return 24;
}

function genOpData(op, comboKey) {
  const state = opState[op];
  const combo = state.combos.find(c => c.key === comboKey);
  const count = calcCardCount(op, combo);
  const questions = Array.from({length: count}, () => genQuestion(op, combo));
  state.data[comboKey] = { questions, combo };
}

function opSymbol(op) {
  return { sub: '−', mul: '×', div: '÷' }[op];
}

function renderOpGrid(op) {
  const state = opState[op];
  const comboKey = state.current;
  if (!state.data[comboKey]) genOpData(op, comboKey);
  const { questions, combo } = state.data[comboKey];
  const grid = document.getElementById(op + '-grid');
  const visible = state.ansVisible;

  const sym = opSymbol(op);
  const symClass = op + '-sym';
  const colorClass = op + '-c';

  // Dynamic card min-width based on digit count
  const maxDigits = Math.max(combo.a + combo.b, String(questions[0]?.ans || 0).length);
  const minW = Math.max(120, maxDigits * 14 + 60);

  let html = `<div class="q-grid" style="--card-min:${minW}px">`;
  questions.forEach((q, i) => {
    const revealed = visible ? 'revealed' : '';
    html += `
      <div class="q-card ${revealed}" style="min-width:${minW}px">
        <div class="q-num">${q.a}</div>
        <div class="q-op-line">
          <span class="q-op-sym ${symClass}">${sym}</span>
          <span class="q-second">${q.b}</span>
        </div>
        <div class="q-ans-line">
          <span class="blank-span q-blank">_ _ _</span>
          <span class="ans-span q-answer">${q.ans}</span>
        </div>
      </div>`;
  });
  html += '</div>';
  grid.innerHTML = html;
}

function opSwitchCombo(op, comboKey) {
  const state = opState[op];
  state.current = comboKey;
  state.ansVisible = false;

  // Update answer button
  const btn = document.getElementById(op + '-ans-btn');
  btn.textContent = '👁 Show Answers';
  btn.className = 'tool-btn ans-show';

  // Update sidebar
  document.querySelectorAll(`#${op}-combo-list .combo-item`).forEach(el => {
    el.classList.toggle('active', el.dataset.key === comboKey);
  });

  // Update toolbar
  const combo = state.combos.find(c => c.key === comboKey);
  document.getElementById(op + '-toolbar-title').textContent = opComboLabel(op, combo);
  document.getElementById(op + '-toolbar-sub').textContent =
    op === 'sub' ? `${combo.a}-digit number minus ${combo.b}-digit number` :
    op === 'mul' ? `${combo.a}-digit × ${combo.b}-digit` :
    `${combo.a}-digit ÷ ${combo.b}-digit (exact)`;

  if (!state.data[comboKey]) genOpData(op, comboKey);
  renderOpGrid(op);
}

function opRefresh(op) {
  const state = opState[op];
  genOpData(op, state.current);
  renderOpGrid(op);
}

function opToggleAns(op) {
  const state = opState[op];
  state.ansVisible = !state.ansVisible;
  const btn = document.getElementById(op + '-ans-btn');
  if (state.ansVisible) {
    btn.textContent = '🙈 Hide Answers';
    btn.className = 'tool-btn ans-hide';
  } else {
    btn.textContent = '👁 Show Answers';
    btn.className = 'tool-btn ans-show';
  }
  renderOpGrid(op);
}

function initOpSidebar(op) {
  const state = opState[op];
  const list = document.getElementById(op + '-combo-list');
  list.innerHTML = '';
  state.combos.forEach(combo => {
    const item = document.createElement('div');
    item.className = `combo-item ${op}-c` + (combo.key === state.current ? ' active' : '');
    item.dataset.key = combo.key;
    item.innerHTML = `
      <span class="combo-badge">${opBadge(op, combo)}</span>
      <span class="combo-label">${opComboLabel(op, combo)}</span>`;
    item.onclick = () => opSwitchCombo(op, combo.key);
    list.appendChild(item);
  });

  // Set initial toolbar
  const combo = state.combos.find(c => c.key === state.current);
  document.getElementById(op + '-toolbar-title').textContent = opComboLabel(op, combo);
  document.getElementById(op + '-toolbar-sub').textContent =
    op === 'sub' ? `${combo.a}-digit number minus ${combo.b}-digit number` :
    op === 'mul' ? `${combo.a}-digit × ${combo.b}-digit` :
    `${combo.a}-digit ÷ ${combo.b}-digit (exact)`;

  genOpData(op, state.current);
  renderOpGrid(op);
}

window.addEventListener('DOMContentLoaded', () => {
  addInit();
  initOpSidebar('sub');
  initOpSidebar('mul');
  initOpSidebar('div');
});
