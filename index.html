<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>➕ Addition Practice</title>
<style>
  :root {
    --primary: #6c63ff;
    --primary-dark: #574fd6;
    --accent: #ff6584;
    --green: #43d98f;
    --green-dark: #2bb87a;
    --bg: #f0f2ff;
    --card: #ffffff;
    --text: #2d2d44;
    --muted: #8888aa;
    --border: #e0e0f5;
    --shadow: 0 4px 20px rgba(108,99,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
    color: white;
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(108,99,255,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; flex: 1; }
  .header-emoji { font-size: 1.5rem; }

  /* ===== STOPWATCH ===== */
  .stopwatch-bar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .sw-display {
    font-size: 2rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--primary);
    letter-spacing: 2px;
    background: var(--bg);
    padding: 6px 20px;
    border-radius: 12px;
    min-width: 160px;
    text-align: center;
  }
  .sw-display.running { color: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

  .sw-btn {
    border: none;
    border-radius: 10px;
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sw-btn:active { transform: scale(0.95); }
  .sw-start { background: var(--green); color: white; }
  .sw-start:hover { background: var(--green-dark); }
  .sw-stop { background: var(--accent); color: white; }
  .sw-reset { background: var(--border); color: var(--muted); }
  .sw-reset:hover { background: #d0d0e8; }

  /* ===== TABS ===== */
  .tabs-wrapper {
    background: white;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    padding: 0 12px;
    gap: 4px;
    min-width: max-content;
  }
  .tab {
    padding: 12px 18px;
    border: none;
    background: transparent;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--primary); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ===== MAIN CONTENT ===== */
  .main { padding: 16px; max-width: 900px; margin: 0 auto; }

  .sheet-panel { display: none; }
  .sheet-panel.active { display: block; }

  /* ===== ACTION ROW ===== */
  .action-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .btn {
    border: none;
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .btn:active { transform: scale(0.96); }
  .btn-refresh { background: linear-gradient(135deg, #6c63ff, #a78bfa); color: white; }
  .btn-refresh:hover { background: linear-gradient(135deg, #574fd6, #9068f5); }
  .btn-answer { background: linear-gradient(135deg, #ff6584, #ff8fa3); color: white; }
  .btn-answer:hover { background: linear-gradient(135deg, #e0496a, #ff7896); }
  .btn-answer.showing { background: linear-gradient(135deg, #43d98f, #5af0a4); }

  /* ===== GRID CARD ===== */
  .grid-card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .grid-title {
    background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
    color: white;
    padding: 14px 20px;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
  }

  table {
    border-collapse: separate;
    border-spacing: 6px;
    width: 100%;
  }

  th {
    background: var(--bg);
    color: var(--primary);
    font-weight: 800;
    font-size: 0.95rem;
    padding: 10px 14px;
    border-radius: 10px;
    text-align: center;
    min-width: 52px;
  }

  td {
    text-align: center;
    padding: 10px 10px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    background: var(--bg);
    border-radius: 10px;
    min-width: 52px;
    transition: background 0.2s;
  }

  td.num {
    background: white;
    border: 2px solid var(--border);
    font-size: 1.05rem;
    color: #333;
  }

  td.total-col {
    background: linear-gradient(135deg, #6c63ff22, #a78bfa22);
    color: var(--primary);
    border: 2px solid #a78bfa55;
    font-size: 1rem;
    font-weight: 800;
  }

  td.total-row {
    background: linear-gradient(135deg, #ff658422, #ff8fa322);
    color: var(--accent);
    border: 2px solid #ff658455;
    font-weight: 800;
  }

  td.total-corner {
    background: linear-gradient(135deg, #6c63ff33, #ff658433);
    color: var(--text);
    font-weight: 900;
    border: 2px solid var(--primary);
  }

  /* Answer styles */
  .answer-cell {
    display: none;
    color: var(--green);
    font-weight: 800;
  }
  .answers-visible .answer-cell { display: inline; }
  .answers-visible .num { border-color: var(--green); background: #f0fff8; }

  /* Basic addition special */
  .basic-label {
    background: var(--bg);
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 600;
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .header-title { font-size: 1.05rem; }
    .sw-display { font-size: 1.6rem; min-width: 130px; }
    .main { padding: 10px; }
    th, td { padding: 7px 6px; min-width: 40px; font-size: 0.85rem; }
    .btn { padding: 9px 14px; font-size: 0.82rem; }
    .grid-title { font-size: 0.9rem; padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-emoji">➕</span>
  <div class="header-title">Addition Practice Sheets</div>
</div>

<!-- STOPWATCH -->
<div class="stopwatch-bar">
  <div class="sw-display" id="swDisplay">00:00.0</div>
  <button class="sw-btn sw-start" id="swBtn" onclick="swToggle()">▶ Start</button>
  <button class="sw-btn sw-reset" onclick="swReset()">↺ Reset</button>
</div>

<!-- TABS -->
<div class="tabs-wrapper">
  <div class="tabs">
    <button class="tab active" onclick="showTab('basic')">Basic</button>
    <button class="tab" onclick="showTab('5x5')">5×5</button>
    <button class="tab" onclick="showTab('6x6')">6×6</button>
    <button class="tab" onclick="showTab('7x7')">7×7</button>
    <button class="tab" onclick="showTab('8x8')">8×8</button>
    <button class="tab" onclick="showTab('9x9')">9×9</button>
    <button class="tab" onclick="showTab('10x10')">10×10</button>
  </div>
</div>

<div class="main">

  <!-- ====== BASIC ADDITION ====== -->
  <div class="sheet-panel active" id="panel-basic">
    <div class="action-row">
      <button class="btn btn-refresh" onclick="refreshSheet('basic')">🔀 Refresh Numbers</button>
      <button class="btn btn-answer" id="ans-basic" onclick="toggleAnswers('basic')">👁 Show Answers</button>
    </div>
    <div class="grid-card">
      <div class="grid-title">📝 Basic Addition — 10 Rows × 10 Columns</div>
      <div class="table-wrap">
        <table id="table-basic"></table>
      </div>
    </div>
  </div>

  <!-- ====== 5×5 ====== -->
  <div class="sheet-panel" id="panel-5x5">
    <div class="action-row">
      <button class="btn btn-refresh" onclick="refreshSheet('5x5')">🔀 Refresh Numbers</button>
      <button class="btn btn-answer" id="ans-5x5" onclick="toggleAnswers('5x5')">👁 Show Answers</button>
    </div>
    <div class="grid-card">
      <div class="grid-title">📝 5×5 Addition Grid</div>
      <div class="table-wrap">
        <table id="table-5x5"></table>
      </div>
    </div>
  </div>

  <!-- ====== 6×6 ====== -->
  <div class="sheet-panel" id="panel-6x6">
    <div class="action-row">
      <button class="btn btn-refresh" onclick="refreshSheet('6x6')">🔀 Refresh Numbers</button>
      <button class="btn btn-answer" id="ans-6x6" onclick="toggleAnswers('6x6')">👁 Show Answers</button>
    </div>
    <div class="grid-card">
      <div class="grid-title">📝 6×6 Addition Grid</div>
      <div class="table-wrap">
        <table id="table-6x6"></table>
      </div>
    </div>
  </div>

  <!-- ====== 7×7 ====== -->
  <div class="sheet-panel" id="panel-7x7">
    <div class="action-row">
      <button class="btn btn-refresh" onclick="refreshSheet('7x7')">🔀 Refresh Numbers</button>
      <button class="btn btn-answer" id="ans-7x7" onclick="toggleAnswers('7x7')">👁 Show Answers</button>
    </div>
    <div class="grid-card">
      <div class="grid-title">📝 7×7 Addition Grid</div>
      <div class="table-wrap">
        <table id="table-7x7"></table>
      </div>
    </div>
  </div>

  <!-- ====== 8×8 ====== -->
  <div class="sheet-panel" id="panel-8x8">
    <div class="action-row">
      <button class="btn btn-refresh" onclick="refreshSheet('8x8')">🔀 Refresh Numbers</button>
      <button class="btn btn-answer" id="ans-8x8" onclick="toggleAnswers('8x8')">👁 Show Answers</button>
    </div>
    <div class="grid-card">
      <div class="grid-title">📝 8×8 Addition Grid</div>
      <div class="table-wrap">
        <table id="table-8x8"></table>
      </div>
    </div>
  </div>

  <!-- ====== 9×9 ====== -->
  <div class="sheet-panel" id="panel-9x9">
    <div class="action-row">
      <button class="btn btn-refresh" onclick="refreshSheet('9x9')">🔀 Refresh Numbers</button>
      <button class="btn btn-answer" id="ans-9x9" onclick="toggleAnswers('9x9')">👁 Show Answers</button>
    </div>
    <div class="grid-card">
      <div class="grid-title">📝 9×9 Addition Grid</div>
      <div class="table-wrap">
        <table id="table-9x9"></table>
      </div>
    </div>
  </div>

  <!-- ====== 10×10 ====== -->
  <div class="sheet-panel" id="panel-10x10">
    <div class="action-row">
      <button class="btn btn-refresh" onclick="refreshSheet('10x10')">🔀 Refresh Numbers</button>
      <button class="btn btn-answer" id="ans-10x10" onclick="toggleAnswers('10x10')">👁 Show Answers</button>
    </div>
    <div class="grid-card">
      <div class="grid-title">📝 10×10 Addition Grid</div>
      <div class="table-wrap">
        <table id="table-10x10"></table>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
// ========================
// UTILITY
// ========================
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ========================
// DATA STORE
// ========================
const data = {};

function genGrid(rows, cols) {
  const grid = [];
  for (let r = 0; r < rows; r++) {
    grid[r] = [];
    for (let c = 0; c < cols; c++) {
      grid[r][c] = randInt(10, 99);
    }
  }
  return grid;
}

// ========================
// RENDER FUNCTIONS
// ========================

// Basic addition: 10 rows (addends) × 10 columns (addends)
// Table shows: top row = col numbers, left col = row numbers, cells = sum (answer)
function renderBasic() {
  const rows = data['basic'].rows; // 10 values
  const cols = data['basic'].cols; // 10 values
  const tbl = document.getElementById('table-basic');
  const showAns = tbl.closest('.sheet-panel').classList.contains('answers-visible') ||
    document.getElementById('panel-basic').classList.contains('answers-visible');

  let html = '<thead><tr><th class="basic-label">+</th>';
  for (let c = 0; c < 10; c++) html += `<th>${cols[c]}</th>`;
  html += '</tr></thead><tbody>';

  for (let r = 0; r < 10; r++) {
    html += `<tr><th>${rows[r]}</th>`;
    for (let c = 0; c < 10; c++) {
      const sum = rows[r] + cols[c];
      html += `<td class="num">${rows[r]}+${cols[c]}<br><span class="answer-cell">${sum}</span></td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  tbl.innerHTML = html;
}

// NxN grid: rows and cols are separate arrays; cells show row val + col val with totals
function renderNxN(key, n) {
  const rows = data[key].rows;
  const cols = data[key].cols;
  const tbl = document.getElementById('table-' + key);

  // col totals
  const colTotals = cols.map(v => rows.reduce((s, r) => s + r + v, 0));
  // row totals
  const rowTotals = rows.map(r => cols.reduce((s, c) => s + r + c, 0));
  const grandTotal = rowTotals.reduce((a, b) => a + b, 0);

  let html = '<thead><tr><th class="basic-label">+</th>';
  for (let c = 0; c < n; c++) html += `<th>${cols[c]}</th>`;
  html += '<th class="basic-label">Total</th></tr></thead><tbody>';

  for (let r = 0; r < n; r++) {
    html += `<tr><th>${rows[r]}</th>`;
    for (let c = 0; c < n; c++) {
      const sum = rows[r] + cols[c];
      html += `<td class="num">${rows[r]}+${cols[c]}<br><span class="answer-cell">${sum}</span></td>`;
    }
    html += `<td class="total-col"><span class="answer-cell">${rowTotals[r]}</span><span style="display:inline" class="question-mark"></span></td>`;
    html += '</tr>';
  }

  // Total row
  html += '<tr><th>Total</th>';
  for (let c = 0; c < n; c++) {
    html += `<td class="total-row"><span class="answer-cell">${colTotals[c]}</span></td>`;
  }
  html += `<td class="total-corner"><span class="answer-cell">${grandTotal}</span></td></tr>`;
  html += '</tbody>';
  tbl.innerHTML = html;
}

// ========================
// INIT DATA & RENDER
// ========================
function initSheet(key, n) {
  if (key === 'basic') {
    data['basic'] = {
      rows: Array.from({length: 10}, () => randInt(10, 99)),
      cols: Array.from({length: 10}, () => randInt(10, 99))
    };
    renderBasic();
  } else {
    data[key] = {
      rows: Array.from({length: n}, () => randInt(10, 99)),
      cols: Array.from({length: n}, () => randInt(10, 99))
    };
    renderNxN(key, n);
  }
}

function initAll() {
  initSheet('basic', 10);
  initSheet('5x5', 5);
  initSheet('6x6', 6);
  initSheet('7x7', 7);
  initSheet('8x8', 8);
  initSheet('9x9', 9);
  initSheet('10x10', 10);
}

// ========================
// REFRESH
// ========================
function refreshSheet(key) {
  const sizes = { basic: 10, '5x5': 5, '6x6': 6, '7x7': 7, '8x8': 8, '9x9': 9, '10x10': 10 };
  const n = sizes[key];

  // Animate refresh
  const tbl = document.getElementById('table-' + key);
  tbl.style.opacity = '0.3';
  tbl.style.transform = 'scale(0.97)';

  setTimeout(() => {
    initSheet(key, n);
    // Reapply answer visibility
    const panel = document.getElementById('panel-' + key);
    if (panel.classList.contains('answers-visible')) {
      // answers stay visible after refresh
    }
    tbl.style.opacity = '1';
    tbl.style.transform = 'scale(1)';
    tbl.style.transition = 'opacity 0.3s, transform 0.3s';
    setTimeout(() => { tbl.style.transition = ''; }, 350);
  }, 150);
}

// ========================
// ANSWERS TOGGLE
// ========================
const answerState = {};

function toggleAnswers(key) {
  const panel = document.getElementById('panel-' + key);
  const btn = document.getElementById('ans-' + key);

  answerState[key] = !answerState[key];

  if (answerState[key]) {
    panel.classList.add('answers-visible');
    btn.textContent = '🙈 Hide Answers';
    btn.classList.add('showing');
  } else {
    panel.classList.remove('answers-visible');
    btn.textContent = '👁 Show Answers';
    btn.classList.remove('showing');
  }
}

// ========================
// TAB SWITCHING
// ========================
function showTab(key) {
  document.querySelectorAll('.sheet-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById('panel-' + key).classList.add('active');
  const tabs = document.querySelectorAll('.tab');
  const tabMap = ['basic', '5x5', '6x6', '7x7', '8x8', '9x9', '10x10'];
  tabs[tabMap.indexOf(key)].classList.add('active');
}

// ========================
// STOPWATCH
// ========================
let swInterval = null;
let swMs = 0;
let swRunning = false;

function swFormat(ms) {
  const mins = Math.floor(ms / 60000);
  const secs = Math.floor((ms % 60000) / 1000);
  const tenths = Math.floor((ms % 1000) / 100);
  return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${tenths}`;
}

function swTick() {
  swMs += 100;
  document.getElementById('swDisplay').textContent = swFormat(swMs);
}

function swToggle() {
  const btn = document.getElementById('swBtn');
  const display = document.getElementById('swDisplay');

  if (!swRunning) {
    swRunning = true;
    swInterval = setInterval(swTick, 100);
    btn.textContent = '⏸ Pause';
    btn.className = 'sw-btn sw-stop';
    display.classList.add('running');
  } else {
    swRunning = false;
    clearInterval(swInterval);
    btn.textContent = '▶ Resume';
    btn.className = 'sw-btn sw-start';
    display.classList.remove('running');
  }
}

function swReset() {
  swRunning = false;
  clearInterval(swInterval);
  swMs = 0;
  document.getElementById('swDisplay').textContent = '00:00.0';
  document.getElementById('swDisplay').classList.remove('running');
  document.getElementById('swBtn').textContent = '▶ Start';
  document.getElementById('swBtn').className = 'sw-btn sw-start';
}

// ========================
// BOOT
// ========================
window.addEventListener('DOMContentLoaded', initAll);
</script>
</body>
</html>
